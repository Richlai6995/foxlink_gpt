<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
    <meta name="theme-color" content="#1e3a8a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Cortex" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <title>Cortex</title>
    <script>
      // Apply theme synchronously before first paint to avoid FOUC
      (function() {
        try {
          var valid = ['dark','dark-dimmed','light-blue','light-green','light-yellow'];
          var t = localStorage.getItem('foxlink-theme');
          if (!valid.includes(t)) {
            // Migrate legacy training-only key
            var legacy = localStorage.getItem('foxlink-training-theme');
            if (valid.includes(legacy)) {
              t = legacy;
              localStorage.setItem('foxlink-theme', t);
            } else {
              // Fallback: read from cached user
              var u = localStorage.getItem('user');
              if (u) {
                try {
                  var parsed = JSON.parse(u);
                  if (valid.includes(parsed && parsed.theme)) t = parsed.theme;
                } catch(_) {}
              }
            }
          }
          document.documentElement.setAttribute('data-theme', valid.includes(t) ? t : 'dark');
        } catch(_) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
