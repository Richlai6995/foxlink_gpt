# ─────────────────────────────────────────────────────────────────────────────
# foxlink-gpt-scheduler — 專用 scheduler pod(replicas=1)
#
# 為什麼要拆:
#   原本 foxlink-gpt deployment 跑 4 個 pod,每個都會 initScheduler 把所有 active
#   排程任務掛到自己的 in-memory cron。toggle 暫停只能停發起 toggle 那個 pod 的 cron,
#   其他 pod 的 cron 還會觸發(雖有 redis lock + DB status 雙重防線,但設計脆弱)。
#
#   此 deployment 開 replicas=1 + strategy: Recreate,保證全 cluster 同時只有
#   一個 scheduler pod。Web pods 設 RUN_SCHEDULERS=false 完全不掛 cron。
#
# Scheduler pod 怎麼跟 web pod 同步:
#   - Web pod 改 DB(toggle/PUT/DELETE)後不能直接通知 scheduler pod
#   - Scheduler pod 每 30 秒 reconcileSchedules:讀 DB → 跟記憶體 cron map diff →
#     新增/移除/重掛。最壞延遲 30 秒。
#
# 為什麼不用 leader election:
#   replicas=1 + Recreate 已經保證單實例。Lease-based leader election 是為了
#   「N pod 隨機選 1」的場景,我們直接寫死 1 個就夠了,簡單可靠。
#
# 部署期間空窗:
#   Recreate strategy 會先終止舊 pod 才起新 pod,中間 30-60 秒沒 cron 觸發。
#   排程任務最壞晚 1 分鐘觸發,可接受(scheduler 本不該頻繁部署)。
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: foxlink-gpt-scheduler
  namespace: foxlink
  labels:
    app: foxlink-gpt-scheduler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: foxlink-gpt-scheduler
  strategy:
    type: Recreate            # 單實例保證:舊 pod 完全 terminate 才起新 pod
  template:
    metadata:
      labels:
        app: foxlink-gpt-scheduler
    spec:
      serviceAccountName: foxlink-gpt
      automountServiceAccountToken: true
      terminationGracePeriodSeconds: 60

      # ── Init: 等 Redis 就緒再啟動 ─────────────────────────────────────────
      initContainers:
        - name: wait-for-redis
          image: redis:7-alpine
          command: ["sh", "-c", "until redis-cli -h redis ping; do echo waiting for redis; sleep 2; done"]

      containers:
        - name: foxlink-gpt-scheduler
          image: 10.8.93.11:5000/foxlink-gpt:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3007

          # ── 環境變數 ────────────────────────────────────────────────────────
          env:
            # 唯一跟 web pod 不同的 env — 顯式設 true(預設也是 true,但寫明意圖)
            - name: RUN_SCHEDULERS
              value: "true"
            - name: PORT
              value: "3007"
            - name: TZ
              value: "Asia/Taipei"
            - name: NODE_ENV
              value: "production"
            - name: UPLOAD_DIR
              value: "/app/uploads"
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: NODE_OPTIONS
              value: "--max-old-space-size=1024"
            # Oracle Instant Client
            - name: ORACLE_HOME
              value: "/opt/oracle/instantclient"
            - name: LD_LIBRARY_PATH
              value: "/opt/oracle/instantclient"
            # GCP Vertex AI SA JSON
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /app/gcp/key.json

          envFrom:
            - secretRef:
                name: foxlink-secrets

          # ── Volume Mounts(與 web pod 對齊,排程任務會產檔 / 用 NFS skill runners)─
          volumeMounts:
            - name: nfs-upload
              mountPath: /app/uploads
            - name: nfs-source
              mountPath: /app/skill_runners
              subPath: skill_runners
            - name: tmp-data
              mountPath: /app/logs
              subPath: logs
            - name: tmp-data
              mountPath: /app/backups
              subPath: backups
            - name: nfs-source
              mountPath: /app/fonts
              subPath: fonts
            - name: nfs-source
              mountPath: /opt/oracle/instantclient
              subPath: oracle_client
            - name: docker-sock
              mountPath: /var/run/docker.sock
              readOnly: true
            - name: mcp-jwt-keys
              mountPath: /app/certs
              readOnly: true
            - name: gcp-vertex-sa
              mountPath: /app/gcp
              readOnly: true

          # ── Resources(比 web pod 低一階 — 沒外部流量、純背景跑)──────────────
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "1536Mi"
              cpu: "1500m"     # 高峰時排程任務含 LLM call + 檔案生成,留足夠 burst

          # ── Health Checks(scheduler pod 也跑 Express,/api/health 仍可用)──
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3007
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /api/health
              port: 3007
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 2

          # ── Graceful Shutdown ─────────────────────────────────────────────
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 15"]

      # ── Volumes(與 web pod 一致)──────────────────────────────────────────
      volumes:
        - name: nfs-upload
          persistentVolumeClaim:
            claimName: pvc-flgpt-upload
        - name: nfs-source
          persistentVolumeClaim:
            claimName: pvc-flgpt-source
        - name: tmp-data
          emptyDir: {}
        - name: docker-sock
          hostPath:
            path: /var/run/docker.sock
            type: ""
        - name: mcp-jwt-keys
          secret:
            secretName: mcp-jwt-keys
            optional: true
            defaultMode: 0400
        - name: gcp-vertex-sa
          secret:
            secretName: gcp-vertex-sa
            optional: true
            defaultMode: 0400
# 註:不掛 Service / Ingress — scheduler pod 不需要被外部請求打到。
#     如需 debug `kubectl exec` 或 port-forward 直連即可。
