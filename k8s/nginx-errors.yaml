# nginx-errors — 客製化錯誤頁面後端
#
# 用途：當 ingress whitelist-source-range 擋掉非授權 IP 時，
# 由 ingress-nginx 將 403/404 路由到本服務，回傳通用「服務無法提供」頁面。
#
# 安全設計（重要！絕對不可違反）：
#   1. 頁面文字絕不提及 whitelist / 允許網段 / 地區 / 權限不足等暗示卡控機制的字眼
#      （顯示 client IP 是為了讓 IT 對 log 用，不是揭露機制）
#   2. 403 / 404 回應一致 → 攻擊者無法 differentiate「被擋 vs 路徑不存在」
#   3. 不暴露技術棧（nginx / K8s）— server_tokens off
#   4. client IP 顯示前用 regex 白名單過濾（防 XSS，異常值顯示 "invalid"）
#   5. 三語並陳（zh-TW / EN / VI）配合越南廠區
#
# 顯示 client IP 的考量（業界做法 - AWS S3 / GitHub Enterprise 同款）：
#   - 對方拿不到資訊就只能猜，反而變成多次刷新攻擊 / 騷擾 IT 電話
#   - 對方拿到 IP → 可以截圖給 IT → IT 對 ingress log 一查就知道哪條規則擋的
#   - 文案用「您的連線位置」而非「您的 IP 不被允許」，不暗示卡控邏輯
#
# 內部辨識方式：
#   - 看到此頁 = ingress 層被擋（whitelist 或路徑不存在）
#   - 排查工具：對方提供畫面截圖 → 看 IP → 對 ingress access log
#     例：kubectl logs -n ingress-nginx -l app.kubernetes.io/name=ingress-nginx | grep <IP>

apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-errors
  namespace: foxlink
  labels:
    app: nginx-errors
data:
  custom_403.html: |
    <!DOCTYPE html>
    <html lang="zh-TW">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width,initial-scale=1">
      <meta name="robots" content="noindex,nofollow">
      <title>Service Unavailable</title>
      <style>
        * { box-sizing: border-box }
        body {
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                       "Microsoft JhengHei", "PingFang TC", sans-serif;
          max-width: 560px;
          margin: 80px auto;
          padding: 24px;
          text-align: center;
          color: #2c3e50;
          line-height: 1.7;
          background: #fafbfc;
        }
        h1 {
          color: #34495e;
          font-weight: 500;
          font-size: 24px;
          margin: 0 0 12px;
        }
        p { margin: 6px 0; color: #555 }
        .lang { margin: 32px 0 }
        .lang:first-of-type { margin-top: 0 }
        .lang strong { color: #2c3e50 }
        .ip {
          margin: 14px 0;
          padding: 10px 14px;
          background: #f4f6f8;
          border-radius: 6px;
          color: #2c3e50;
          font-size: 14px;
        }
        .ip code {
          font-family: "SF Mono", Menlo, Consolas, monospace;
          color: #c0392b;
          font-weight: 500;
        }
      </style>
    </head>
    <body>
      <section class="lang" lang="zh-TW">
        <h1>服務目前無法提供</h1>
        <p>很抱歉造成您的不便。</p>
        <p class="ip">您的連線位置：<code>__CLIENT_IP__</code></p>
        <p>如需協助，請聯絡正崴<strong>當地資訊協助</strong></p>
        <p>或聯絡<strong>總部 Cortex 管理員</strong>協助</p>
      </section>
      <section class="lang" lang="en">
        <h1>Service Currently Unavailable</h1>
        <p>We apologize for the inconvenience.</p>
        <p class="ip">Your connection address: <code>__CLIENT_IP__</code></p>
        <p>For assistance, please contact your <strong>local Foxlink IT support</strong></p>
        <p>or contact the <strong>HQ Cortex administrator</strong>.</p>
      </section>
      <section class="lang" lang="vi">
        <h1>Dịch vụ hiện không khả dụng</h1>
        <p>Chúng tôi xin lỗi vì sự bất tiện này.</p>
        <p class="ip">Địa chỉ kết nối của bạn: <code>__CLIENT_IP__</code></p>
        <p>Để được hỗ trợ, vui lòng liên hệ <strong>bộ phận IT Foxlink tại địa phương</strong></p>
        <p>hoặc liên hệ <strong>quản trị viên Cortex tại trụ sở chính</strong>.</p>
      </section>
    </body>
    </html>

  default.conf: |
    # client IP 顯示用 — 嚴格白名單字元防 XSS
    # ingress-nginx 會在 X-Forwarded-For 放真實 client IP（trust ingress 設定）
    # 但仍然 regex 過濾，只允許 IP 合法字元，異常值顯示 "invalid"
    map $http_x_forwarded_for $client_ip_display {
      default                      "invalid";
      ""                           "unknown";
      "~^[0-9a-fA-F\.\:, ]+$"      $http_x_forwarded_for;
    }

    server {
      listen 8080 default_server;
      server_name _;
      charset utf-8;

      # 隱藏 nginx 版本（避免技術棧洩漏）
      server_tokens off;

      # K8s liveness/readiness probe
      location = /healthz {
        access_log off;
        return 200 "ok\n";
      }

      # 任何路徑都回客製錯誤頁（status forced to 403）
      location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer" always;
        return 404;
      }

      # error_page 404 → 強制 rewrite 為 403 + serve 客製 HTML
      # （403/404 統一回同一頁同一狀態碼，無法 differentiate）
      error_page 404 =403 /custom_403.html;

      location = /custom_403.html {
        internal;
        root /usr/share/nginx/html;
        default_type text/html;

        # 把 HTML 裡的 __CLIENT_IP__ placeholder 替換成 client IP
        # sub_filter_once off → 三段語言每段都有，全部替換
        sub_filter '__CLIENT_IP__' '$client_ip_display';
        sub_filter_once off;
        sub_filter_types text/html;
      }
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-errors
  namespace: foxlink
  labels:
    app: nginx-errors
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-errors
  template:
    metadata:
      labels:
        app: nginx-errors
    spec:
      # 用 nginx-unprivileged：non-root user 101，listen 8080
      containers:
        - name: nginx
          image: nginxinc/nginx-unprivileged:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false  # nginx 需寫 /tmp /var/cache
            runAsNonRoot: true
            runAsUser: 101
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html/custom_403.html
              subPath: custom_403.html
              readOnly: true
            - name: conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
      volumes:
        - name: html
          configMap:
            name: nginx-errors
            items:
              - key: custom_403.html
                path: custom_403.html
        - name: conf
          configMap:
            name: nginx-errors
            items:
              - key: default.conf
                path: default.conf

---
apiVersion: v1
kind: Service
metadata:
  name: nginx-errors
  namespace: foxlink
  labels:
    app: nginx-errors
spec:
  selector:
    app: nginx-errors
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
