# nginx-errors — 客製化錯誤頁面後端
#
# 用途：當 ingress whitelist-source-range 擋掉非授權 IP 時，
# 由 ingress-nginx 將 403/404 路由到本服務，回傳通用「服務無法提供」頁面。
#
# 安全設計（重要！絕對不可違反）：
#   1. 頁面內容絕不提及 IP、網段、whitelist、地區、權限不足等字眼
#   2. 不顯示對方 client IP（避免 NAT 偵測）
#   3. 403 / 404 回應一致 → 攻擊者無法 differentiate「被擋 vs 路徑不存在」
#   4. 不暴露技術棧（nginx / K8s / Foxlink GPT）
#   5. Ref code 是隨機字串，內部 SOP 對應「= IP 被擋」，外部看不出意義
#
# 內部辨識方式：
#   - 看到此頁 = ingress 層被擋（whitelist 或路徑不存在）
#   - 內部 wiki 記載 Ref code 前綴對照表（不寫在頁面上）
#   - ingress access log 接 Loki 可直接查 client IP + 拒絕原因

apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-errors
  namespace: foxlink
  labels:
    app: nginx-errors
data:
  custom_403.html: |
    <!DOCTYPE html>
    <html lang="zh-TW">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width,initial-scale=1">
      <meta name="robots" content="noindex,nofollow">
      <title>Service Unavailable</title>
      <style>
        * { box-sizing: border-box }
        body {
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                       "Microsoft JhengHei", "PingFang TC", sans-serif;
          max-width: 560px;
          margin: 80px auto;
          padding: 24px;
          text-align: center;
          color: #2c3e50;
          line-height: 1.7;
          background: #fafbfc;
        }
        h1 {
          color: #34495e;
          font-weight: 400;
          font-size: 28px;
          margin: 0 0 24px;
        }
        p { margin: 10px 0; color: #555 }
        .contact { margin-top: 32px }
        .contact strong { color: #2c3e50 }
        a { color: #2980b9; text-decoration: none }
        a:hover { text-decoration: underline }
        hr { border: 0; border-top: 1px solid #ecf0f1; margin: 40px 0 20px }
        .ref {
          color: #95a5a6;
          font-size: 12px;
          font-family: "SF Mono", Menlo, Consolas, monospace;
        }
      </style>
    </head>
    <body>
      <h1>服務目前無法提供</h1>
      <p>很抱歉造成您的不便。</p>
      <div class="contact">
        <p>如需協助，請聯絡正崴資訊部</p>
        <p>分機 <strong>5888</strong> 或來信 <a href="mailto:it@foxlink.com.tw">it@foxlink.com.tw</a></p>
      </div>
      <hr>
      <p class="ref">Ref: <span id="ref"></span></p>
      <script>
        // Ref code 給內部 IT 對 log 用，外部看不出意義
        // 前綴 FX 是內部識別 marker（內部 SOP 知道：FX = Foxlink GPT 系統的拒絕頁）
        var rand = Math.random().toString(36).slice(2, 10).toUpperCase();
        var ts = new Date().toISOString().slice(0, 16).replace(/[-:T]/g, '');
        document.getElementById('ref').textContent = 'FX-' + rand + '-' + ts;
      </script>
    </body>
    </html>

  default.conf: |
    server {
      listen 8080 default_server;
      server_name _;
      charset utf-8;

      # 隱藏 nginx 版本（避免技術棧洩漏）
      server_tokens off;

      # K8s liveness/readiness probe
      location = /healthz {
        access_log off;
        return 200 "ok\n";
      }

      # 任何路徑都回客製錯誤頁（status forced to 403）
      location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer" always;
        return 404;
      }

      # error_page 404 → 強制 rewrite 為 403 + serve 客製 HTML
      # （403/404 統一回同一頁同一狀態碼，無法 differentiate）
      error_page 404 =403 /custom_403.html;

      location = /custom_403.html {
        internal;
        root /usr/share/nginx/html;
        default_type text/html;
      }
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-errors
  namespace: foxlink
  labels:
    app: nginx-errors
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-errors
  template:
    metadata:
      labels:
        app: nginx-errors
    spec:
      # 用 nginx-unprivileged：non-root user 101，listen 8080
      containers:
        - name: nginx
          image: nginxinc/nginx-unprivileged:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false  # nginx 需寫 /tmp /var/cache
            runAsNonRoot: true
            runAsUser: 101
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html/custom_403.html
              subPath: custom_403.html
              readOnly: true
            - name: conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
      volumes:
        - name: html
          configMap:
            name: nginx-errors
            items:
              - key: custom_403.html
                path: custom_403.html
        - name: conf
          configMap:
            name: nginx-errors
            items:
              - key: default.conf
                path: default.conf

---
apiVersion: v1
kind: Service
metadata:
  name: nginx-errors
  namespace: foxlink
  labels:
    app: nginx-errors
spec:
  selector:
    app: nginx-errors
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
