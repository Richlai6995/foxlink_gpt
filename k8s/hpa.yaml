apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: foxlink-gpt-hpa
  namespace: foxlink
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: foxlink-gpt
  minReplicas: 4
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
