apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: foxlink-gpt
  namespace: foxlink
  annotations:
    # SSE streaming 必要設定
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    # 檔案上傳大小 (音訊/PDF 最大 60MB)
    nginx.ingress.kubernetes.io/proxy-body-size: "160m"
    # 併發連線優化
    nginx.ingress.kubernetes.io/upstream-keepalive-connections: "100"
    nginx.ingress.kubernetes.io/proxy-next-upstream-timeout: "5"
    # ⚠️ 不要加 limit-connections! ingress 看到的 client IP 都是 K8s NAT 後的同一個 (10.244.x.x)，
    # 全公司用戶會共用同一個 conn quota，瞬間爆 503。
    # 若要做限流，改用 limit-rps (request rate)，或先設定 externalTrafficPolicy: Local 拿到真實 client IP。
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - flgpt.foxlink.com.tw
      secretName: flgpt-tls
  rules:
    - host: flgpt.foxlink.com.tw
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: foxlink-gpt
                port:
                  number: 3007
---
# Custom headers ConfigMap (upstream keepalive)
apiVersion: v1
kind: ConfigMap
metadata:
  name: custom-headers
  namespace: foxlink
data:
  Connection: "keep-alive"
  X-Accel-Buffering: "no"
