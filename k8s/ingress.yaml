apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: foxlink-gpt
  namespace: foxlink
  annotations:
    # SSE streaming 必要設定
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    # 檔案上傳大小 (音訊/PDF 最大 60MB)
    nginx.ingress.kubernetes.io/proxy-body-size: "160m"
    # 併發連線優化
    nginx.ingress.kubernetes.io/upstream-keepalive-connections: "100"
    nginx.ingress.kubernetes.io/proxy-next-upstream-timeout: "5"
    nginx.ingress.kubernetes.io/limit-connections: "50"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - flgpt.foxlink.com.tw
      secretName: flgpt-tls
  rules:
    - host: flgpt.foxlink.com.tw
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: foxlink-gpt
                port:
                  number: 3007
---
# Custom headers ConfigMap (upstream keepalive)
apiVersion: v1
kind: ConfigMap
metadata:
  name: custom-headers
  namespace: foxlink
data:
  Connection: "keep-alive"
  X-Accel-Buffering: "no"
