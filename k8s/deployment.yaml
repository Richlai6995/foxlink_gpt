apiVersion: v1
kind: Namespace
metadata:
  name: foxlink
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: foxlink-gpt
  namespace: foxlink
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: foxlink-gpt-monitor
rules:
  - apiGroups: [""]
    resources: ["nodes", "pods", "events", "namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: foxlink-gpt-monitor
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: foxlink-gpt-monitor
subjects:
  - kind: ServiceAccount
    name: foxlink-gpt
    namespace: foxlink
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: foxlink-gpt
  namespace: foxlink
  labels:
    app: foxlink-gpt
spec:
  replicas: 4
  selector:
    matchLabels:
      app: foxlink-gpt
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0        # 零停機，永遠保持 3 個 pod 可用
  template:
    metadata:
      labels:
        app: foxlink-gpt
    spec:
      serviceAccountName: foxlink-gpt
      automountServiceAccountToken: true
      terminationGracePeriodSeconds: 60

      # ── Init: 等 Redis 就緒再啟動 ─────────────────────────────────────────
      initContainers:
        - name: wait-for-redis
          image: redis:7-alpine
          command: ["sh", "-c", "until redis-cli -h redis ping; do echo waiting for redis; sleep 2; done"]

      containers:
        - name: foxlink-gpt
          image: 10.8.93.11:5000/foxlink-gpt:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3007

          # ── 環境變數 ────────────────────────────────────────────────────────
          env:
            - name: PORT
              value: "3007"
            - name: TZ
              value: "Asia/Taipei"
            - name: NODE_ENV
              value: "production"
            - name: UPLOAD_DIR
              value: "/app/uploads"
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: NODE_OPTIONS
              value: "--max-old-space-size=1536"
            - name: WEBEX_ROOMS_PER_POLL
              value: "1000"
            - name: WEBEX_POLL_INTERVAL_MS
              value: "5000"
            # Oracle Instant Client
            # TODO: 確認版本後更新路徑
            - name: ORACLE_HOME
              value: "/opt/oracle/instantclient"
            - name: LD_LIBRARY_PATH
              value: "/opt/oracle/instantclient"
            # ── GCP Vertex AI SA JSON 絕對路徑（覆蓋 envFrom 的相對路徑）──
            # Secret gcp-vertex-sa 掛在 /app/gcp,裡面的 file name = key.json
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /app/gcp/key.json

          envFrom:
            - secretRef:
                name: foxlink-secrets          # kubectl create secret generic foxlink-secrets --from-env-file=server/.env

          # ── Volume Mounts ─────────────────────────────────────────────────
          volumeMounts:
            # ── 持久化：上傳檔案（NFS）──
            - name: nfs-upload
              mountPath: /app/uploads
            # ── 持久化：Skill Runners（NFS，pod 重啟後保留）──
            - name: nfs-source
              mountPath: /app/skill_runners
              subPath: skill_runners
            # ── 暫存：logs / backups（pod 重啟後不需保留）──
            - name: tmp-data
              mountPath: /app/logs
              subPath: logs
            - name: tmp-data
              mountPath: /app/backups
              subPath: backups
            # ── CJK 字型（NFS 持久化，PDF 中文需要）──
            - name: nfs-source
              mountPath: /app/fonts
              subPath: fonts
            # ── Oracle Instant Client（NFS subPath: oracle_client）──
            - name: nfs-source
              mountPath: /opt/oracle/instantclient
              subPath: oracle_client
            # ── Docker Socket（監控用）──
            - name: docker-sock
              mountPath: /var/run/docker.sock
              readOnly: true
            # ── MCP JWT key pair（只讀）──
            # Secret: mcp-jwt-keys（由 deploy.sh 自動從 server/certs/*.pem 同步）
            # .env 需設 MCP_JWT_PRIVATE_KEY_PATH=/app/certs/mcp-jwt-private.pem
            - name: mcp-jwt-keys
              mountPath: /app/certs
              readOnly: true
            # ── GCP Vertex AI Service Account JSON（只讀）──
            # Secret: gcp-vertex-sa（由 deploy.sh 自動從 server/certs/vertex-ai-sa.json 同步）
            # env GOOGLE_APPLICATION_CREDENTIALS=/app/gcp/key.json 指向這裡
            - name: gcp-vertex-sa
              mountPath: /app/gcp
              readOnly: true

          # ── Resources ────────────────────────────────────────────────────
          resources:
            requests:
              memory: "768Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"

          # ── Health Checks ─────────────────────────────────────────────────
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3007
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /api/health
              port: 3007
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 2

          # ── Graceful Shutdown ─────────────────────────────────────────────
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 15"]

      # ── Volumes ────────────────────────────────────────────────────────────
      volumes:
        - name: nfs-upload
          persistentVolumeClaim:
            claimName: pvc-flgpt-upload
        - name: nfs-source
          persistentVolumeClaim:
            claimName: pvc-flgpt-source
        - name: tmp-data
          emptyDir: {}
        - name: docker-sock
          hostPath:
            path: /var/run/docker.sock
            type: ""
        - name: mcp-jwt-keys
          secret:
            secretName: mcp-jwt-keys
            optional: true   # 暫允許未建立時 pod 照常啟動(send_user_token=1 才會用到)
            defaultMode: 0400
        - name: gcp-vertex-sa
          secret:
            secretName: gcp-vertex-sa
            optional: true   # 沒設時 GEMINI_PROVIDER=vertex 會失敗，但 pod 仍可啟動 fallback 到 AI Studio
            defaultMode: 0400
---
apiVersion: v1
kind: Service
metadata:
  name: foxlink-gpt
  namespace: foxlink
spec:
  selector:
    app: foxlink-gpt
  ports:
    - port: 3007
      targetPort: 3007
  type: ClusterIP
