apiVersion: v1
kind: Namespace
metadata:
  name: foxlink
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: foxlink-gpt
  namespace: foxlink
  labels:
    app: foxlink-gpt
spec:
  replicas: 3
  selector:
    matchLabels:
      app: foxlink-gpt
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0        # 零停機，永遠保持 3 個 pod 可用
  template:
    metadata:
      labels:
        app: foxlink-gpt
    spec:
      terminationGracePeriodSeconds: 60

      # ── Init: 等 Redis 就緒再啟動 ─────────────────────────────────────────
      initContainers:
        - name: wait-for-redis
          image: redis:7-alpine
          command: ["sh", "-c", "until redis-cli -h redis ping; do echo waiting for redis; sleep 2; done"]

      containers:
        - name: foxlink-gpt
          image: your-registry/foxlink-gpt:latest   # TODO: 替換為實際 image registry
          imagePullPolicy: Always
          ports:
            - containerPort: 3007

          # ── 環境變數 ────────────────────────────────────────────────────────
          env:
            - name: PORT
              value: "3007"
            - name: TZ
              value: "Asia/Taipei"
            - name: NODE_ENV
              value: "production"
            - name: UPLOAD_DIR
              value: "/app/uploads"
            - name: REDIS_URL
              value: "redis://redis:6379"
            # Oracle Instant Client
            # TODO: 確認版本後更新路徑
            - name: ORACLE_HOME
              value: "/opt/oracle/instantclient"
            - name: LD_LIBRARY_PATH
              value: "/opt/oracle/instantclient"

          envFrom:
            - secretRef:
                name: foxlink-secrets          # kubectl create secret generic foxlink-secrets --from-env-file=server/.env

          # ── Volume Mounts ─────────────────────────────────────────────────
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
            - name: oracle-client
              mountPath: /opt/oracle/instantclient
              readOnly: true

          # ── Resources ────────────────────────────────────────────────────
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"

          # ── Health Checks ─────────────────────────────────────────────────
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3007
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /api/health
              port: 3007
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 2

          # ── Graceful Shutdown ─────────────────────────────────────────────
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 15"]

      # ── Volumes ────────────────────────────────────────────────────────────
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: foxlink-nfs-pvc
        - name: oracle-client
          # TODO: 確認 Oracle Instant Client 掛載方式（NFS PVC 或 hostPath）
          # 選項 A：獨立 NFS PVC（推薦）
          persistentVolumeClaim:
            claimName: foxlink-oracle-pvc
          # 選項 B：hostPath（每個 node 都要有 Oracle client）
          # hostPath:
          #   path: /opt/oracle/instantclient
          #   type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: foxlink-gpt
  namespace: foxlink
spec:
  selector:
    app: foxlink-gpt
  ports:
    - port: 3007
      targetPort: 3007
  type: ClusterIP
