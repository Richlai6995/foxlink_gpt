apiVersion: v1
kind: Namespace
metadata:
  name: foxlink
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: foxlink-gpt
  namespace: foxlink
  labels:
    app: foxlink-gpt
spec:
  replicas: 4
  selector:
    matchLabels:
      app: foxlink-gpt
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0        # 零停機，永遠保持 3 個 pod 可用
  template:
    metadata:
      labels:
        app: foxlink-gpt
    spec:
      terminationGracePeriodSeconds: 60

      # ── Init: 等 Redis 就緒再啟動 ─────────────────────────────────────────
      initContainers:
        - name: wait-for-redis
          image: redis:7-alpine
          command: ["sh", "-c", "until redis-cli -h redis ping; do echo waiting for redis; sleep 2; done"]

      containers:
        - name: foxlink-gpt
          image: your-registry/foxlink-gpt:latest   # TODO: 替換為實際 image registry
          imagePullPolicy: Always
          ports:
            - containerPort: 3007

          # ── 環境變數 ────────────────────────────────────────────────────────
          env:
            - name: PORT
              value: "3007"
            - name: TZ
              value: "Asia/Taipei"
            - name: NODE_ENV
              value: "production"
            - name: UPLOAD_DIR
              value: "/app/uploads"
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: NODE_OPTIONS
              value: "--max-old-space-size=1536"
            # Oracle Instant Client
            # TODO: 確認版本後更新路徑
            - name: ORACLE_HOME
              value: "/opt/oracle/instantclient"
            - name: LD_LIBRARY_PATH
              value: "/opt/oracle/instantclient"

          envFrom:
            - secretRef:
                name: foxlink-secrets          # kubectl create secret generic foxlink-secrets --from-env-file=server/.env

          # ── Volume Mounts ─────────────────────────────────────────────────
          volumeMounts:
            # ── 持久化資料（全部走同一個 NFS PVC，用 subPath 區分）──
            - name: nfs-storage
              mountPath: /app/uploads
              subPath: uploads
            - name: nfs-storage
              mountPath: /app/logs
              subPath: logs
            - name: nfs-storage
              mountPath: /app/backups
              subPath: backups
            - name: nfs-storage
              mountPath: /app/fonts
              subPath: fonts
            - name: nfs-storage
              mountPath: /app/skill_runners
              subPath: skill_runners
            # ── Oracle Instant Client ──
            - name: nfs-storage
              mountPath: /opt/oracle/instantclient
              subPath: oracle_client
              readOnly: true

          # ── Resources ────────────────────────────────────────────────────
          resources:
            requests:
              memory: "768Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"

          # ── Health Checks ─────────────────────────────────────────────────
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3007
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /api/health
              port: 3007
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 2

          # ── Graceful Shutdown ─────────────────────────────────────────────
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 15"]

      # ── Volumes ────────────────────────────────────────────────────────────
      volumes:
        - name: nfs-storage
          persistentVolumeClaim:
            claimName: foxlink-nfs-pvc   # 單一 NFS PVC，用 subPath 區分各目錄
---
apiVersion: v1
kind: Service
metadata:
  name: foxlink-gpt
  namespace: foxlink
spec:
  selector:
    app: foxlink-gpt
  ports:
    - port: 3007
      targetPort: 3007
  type: ClusterIP
