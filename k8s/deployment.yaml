apiVersion: v1
kind: Namespace
metadata:
  name: foxlink
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: foxlink-gpt
  namespace: foxlink
  labels:
    app: foxlink-gpt
spec:
  replicas: 4
  selector:
    matchLabels:
      app: foxlink-gpt
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0        # 零停機，永遠保持 3 個 pod 可用
  template:
    metadata:
      labels:
        app: foxlink-gpt
    spec:
      terminationGracePeriodSeconds: 60

      # ── Init: 等 Redis 就緒再啟動 ─────────────────────────────────────────
      initContainers:
        - name: wait-for-redis
          image: redis:7-alpine
          command: ["sh", "-c", "until redis-cli -h redis ping; do echo waiting for redis; sleep 2; done"]

      containers:
        - name: foxlink-gpt
          image: 10.8.93.11:5000/foxlink-gpt:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3007

          # ── 環境變數 ────────────────────────────────────────────────────────
          env:
            - name: PORT
              value: "3007"
            - name: TZ
              value: "Asia/Taipei"
            - name: NODE_ENV
              value: "production"
            - name: UPLOAD_DIR
              value: "/app/uploads"
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: NODE_OPTIONS
              value: "--max-old-space-size=1536"
            # Oracle Instant Client
            # TODO: 確認版本後更新路徑
            - name: ORACLE_HOME
              value: "/opt/oracle/instantclient"
            - name: LD_LIBRARY_PATH
              value: "/opt/oracle/instantclient"

          envFrom:
            - secretRef:
                name: foxlink-secrets          # kubectl create secret generic foxlink-secrets --from-env-file=server/.env

          # ── Volume Mounts ─────────────────────────────────────────────────
          volumeMounts:
            # ── 持久化：上傳檔案（NFS）──
            - name: nfs-upload
              mountPath: /app/uploads
            # ── 持久化：Skill Runners（NFS，pod 重啟後保留）──
            - name: nfs-source
              mountPath: /app/skill_runners
              subPath: skill_runners
            # ── 暫存：logs / backups / fonts（pod 重啟後不需保留）──
            - name: tmp-data
              mountPath: /app/logs
              subPath: logs
            - name: tmp-data
              mountPath: /app/backups
              subPath: backups
            - name: tmp-data
              mountPath: /app/fonts
              subPath: fonts
            # ── Oracle Instant Client（NFS subPath: oracle_client）──
            - name: nfs-source
              mountPath: /opt/oracle/instantclient
              subPath: oracle_client

          # ── Resources ────────────────────────────────────────────────────
          resources:
            requests:
              memory: "768Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"

          # ── Health Checks ─────────────────────────────────────────────────
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3007
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /api/health
              port: 3007
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 2

          # ── Graceful Shutdown ─────────────────────────────────────────────
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 15"]

      # ── Volumes ────────────────────────────────────────────────────────────
      volumes:
        - name: nfs-upload
          persistentVolumeClaim:
            claimName: pvc-flgpt-upload
        - name: nfs-source
          persistentVolumeClaim:
            claimName: pvc-flgpt-source
        - name: tmp-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: foxlink-gpt
  namespace: foxlink
spec:
  selector:
    app: foxlink-gpt
  ports:
    - port: 3007
      targetPort: 3007
  type: ClusterIP
