apiVersion: v1
kind: PersistentVolume
metadata:
  name: foxlink-nfs-pv
spec:
  capacity:
    storage: 500Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  nfs:
    server: 192.168.x.x          # TODO: 替換為 Synology NAS IP
    path: /volume1/foxlink-gpt    # TODO: 替換為 NAS 共用資料夾根路徑（subPath 在 deployment.yaml 區分）
  mountOptions:
    - nfsvers=4.1
    - hard
    - timeo=600
    - retrans=3
    - noatime
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: foxlink-nfs-pvc
  namespace: foxlink
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 500Gi
  volumeName: foxlink-nfs-pv
